<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Rodada Multidisciplinar UTI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#F5F7F8; --surface:#FFFFFF; --ink:#1F2937; --muted:#647079; --line:#E2E7EA;
    --teal:#0F6E6E; --teal-dark:#0B5555; --teal-tint:#E4F1F0;
    --amber:#B45309; --amber-tint:#FDF3E3; --danger:#B3261E; --danger-tint:#FBEAE9;
    --green:#2F7D5A; --green-tint:#E7F3EC; --radius:10px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',system-ui,sans-serif;font-size:13.5px;line-height:1.4;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  #app{max-width:1600px;margin:0 auto;padding:20px 20px 60px;}

  .topbar{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;}
  .brand{display:flex;align-items:center;gap:12px;}
  .brand-mark{width:38px;height:38px;border-radius:9px;background:var(--teal);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-family:'IBM Plex Mono',monospace;font-size:13px;}
  .brand h1{font-size:17px;margin:0;font-weight:700;}
  .brand .sub{font-size:12px;color:var(--muted);margin-top:1px;}

  button{font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:8px 12px;transition:.12s ease;}
  button:hover{border-color:var(--teal);color:var(--teal-dark);}
  button:focus-visible{outline:2px solid var(--teal);outline-offset:1px;}
  button.primary{background:var(--teal);border-color:var(--teal);color:#fff;}
  button.primary:hover{background:var(--teal-dark);border-color:var(--teal-dark);color:#fff;}
  button.ghost{background:transparent;border-color:transparent;color:var(--muted);}
  button.ghost:hover{color:var(--teal-dark);}
  button.danger-outline{border-color:var(--danger);color:var(--danger);}
  button.danger-outline:hover{background:var(--danger-tint);}
  button:disabled{opacity:.45;cursor:not-allowed;}

  .stats{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px 14px;min-width:120px;flex:1;}
  .stat .n{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
  .stat.warn .n{color:var(--amber);} .stat.alert .n{color:var(--danger);} .stat.ok .n{color:var(--teal);}

  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px;}
  .tab{padding:9px 4px;margin-right:18px;background:none;border:none;border-bottom:2px solid transparent;border-radius:0;font-weight:600;color:var(--muted);}
  .tab.active{color:var(--teal-dark);border-bottom-color:var(--teal);}

  .archive-controls{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .archive-controls input[type=date]{font-family:inherit;font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid var(--line);}

  .table-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:auto;}
  table{width:100%;border-collapse:collapse;min-width:1900px;}
  thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);padding:9px 8px;border-bottom:1px solid var(--line);background:#FAFBFC;white-space:nowrap;position:sticky;top:0;}
  tbody td{padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#FAFCFC;}

  .cell-input,.cell-textarea,.cell-select{width:100%;font-family:inherit;font-size:12.5px;border:1px solid transparent;background:transparent;border-radius:6px;padding:4px 5px;color:var(--ink);resize:vertical;}
  .cell-input:hover,.cell-textarea:hover,.cell-select:hover{border-color:var(--line);}
  .cell-input:focus,.cell-textarea:focus,.cell-select:focus{outline:none;border-color:var(--teal);background:#fff;box-shadow:0 0 0 3px var(--teal-tint);}
  .cell-textarea{min-height:40px;}
  .name-cell{min-width:150px;}
  .name-cell input.nome{font-weight:600;font-size:13px;}
  .name-cell input.leito{margin-top:2px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);}
  .name-cell input.data-visita{margin-top:2px;font-size:11px;color:var(--muted);}

  .stale-tag{display:inline-block;margin-top:3px;font-size:10px;padding:1px 6px;border-radius:20px;background:var(--amber-tint);color:var(--amber);font-weight:600;}
  .fresh-tag{display:inline-block;margin-top:3px;font-size:10px;padding:1px 6px;border-radius:20px;background:var(--green-tint);color:var(--green);font-weight:600;}
  .alert-tag{display:inline-block;margin-top:3px;font-size:10px;padding:1px 7px;border-radius:20px;background:#FF3B30;color:#fff;font-weight:800;box-shadow:0 0 0 2px rgba(255,59,48,.25);}

  .dva-col{min-width:170px;}
  .chip-list{display:flex;flex-wrap:wrap;gap:5px;}
  .chip{font-size:11px;padding:4px 9px;border-radius:20px;border:1.5px solid var(--line);background:#fff;color:var(--muted);font-weight:600;cursor:pointer;transition:.1s ease;}
  .chip:hover{border-color:var(--teal);color:var(--teal-dark);}
  .chip.on{background:var(--teal);border-color:var(--teal);color:#fff;}
  .chip-static{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--teal-tint);color:var(--teal-dark);font-weight:600;margin:0 4px 4px 0;}

  .cluster{min-width:170px;}
  .mini-field{display:flex;justify-content:space-between;align-items:center;gap:6px;margin-bottom:4px;}
  .mini-field:last-child{margin-bottom:0;}
  .mini-field .ml{font-size:11px;color:var(--muted);flex:0 0 70px;}
  .mini-field select, .mini-field input[type=date]{flex:1;font-size:11.5px;padding:3px 4px;border-radius:5px;border:1px solid var(--line);background:#fff;min-width:0;}
  .mini-field select:focus, .mini-field input[type=date]:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 2px var(--teal-tint);}
  .sub-group{border-top:1px dashed var(--line);padding-top:5px;margin-top:5px;}
  .sub-group:first-child{border-top:none;padding-top:0;margin-top:0;}
  .sub-group-title{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:3px;letter-spacing:.3px;}
  .dev-cluster{min-width:300px;display:grid;grid-template-columns:1fr 1fr;gap:2px 12px;}
  .dev-cluster .sub-group{border-top:none;padding-top:0;margin-top:0;border-left:1px dashed var(--line);padding-left:8px;}
  .dev-cluster .sub-group:nth-child(odd){border-left:none;padding-left:0;}

  .hd-col{min-width:200px;}
  .hd-col textarea{min-height:70px;}
  .atb-col{min-width:180px;}
  .atb-col textarea{min-height:60px;}
  .metas-col{min-width:260px;}
  .metas-col textarea{min-height:90px;}

  .actions-cell{display:flex;flex-direction:column;gap:6px;min-width:110px;}
  .actions-cell button{width:100%;font-size:12px;padding:6px 8px;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-state b{color:var(--ink);}

  .overlay{position:fixed;inset:0;background:rgba(20,26,28,.45);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .modal{background:#fff;border-radius:14px;padding:22px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);}
  .modal h2{margin:0 0 4px;font-size:16px;}
  .modal p.desc{margin:0 0 16px;color:var(--muted);font-size:12.5px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;}
  .field input,.field textarea,.field select{width:100%;font-family:inherit;font-size:13.5px;padding:8px 10px;border-radius:8px;border:1px solid var(--line);}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-tint);}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}

  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:80;opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}

  footer.note{margin-top:22px;font-size:11.5px;color:var(--muted);line-height:1.6;}
  .chart-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:14px;}
  .bed-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));gap:12px;}
  .bed-card{border-radius:10px;padding:12px;min-height:100px;}
  .bed-card.ocupado{background:var(--teal-tint);border:1px solid var(--teal);}
  .bed-card.vago{background:#FAFBFC;border:1px dashed var(--line);display:flex;align-items:center;justify-content:center;min-height:100px;}
  .bed-row{display:flex;gap:6px;font-size:11px;padding:1px 0;line-height:1.35;}
  .bed-row-label{flex:0 0 66px;color:var(--muted);font-weight:700;text-transform:uppercase;font-size:9.5px;letter-spacing:.2px;padding-top:1px;}
  .bed-row-value{flex:1;color:var(--ink);word-break:break-word;}
  .huddle-card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
  .huddle-header{font-weight:700;font-size:13.5px;margin-bottom:6px;color:var(--teal-dark);}
  .huddle-goal{display:flex;gap:8px;align-items:flex-start;font-size:13px;padding:5px 0;cursor:pointer;}
  .huddle-goal.done{text-decoration:line-through;color:var(--muted);}
  .huddle-goal input{margin-top:2px;}
  .bed-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);font-weight:700;}
  .bed-nome{font-size:13px;font-weight:700;margin:2px 0;}
  .bed-info{font-size:11px;color:var(--muted);}
  .chart-title{font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:10px;}

  @media (max-width:900px){
    .table-wrap{overflow-x:visible;}
    table{min-width:0;}
    thead{display:none;}
    tbody td{display:block;border-bottom:none;padding:6px 4px;}
    tbody tr{display:block;border-bottom:2px solid var(--line);padding:12px 6px;}
    tbody td::before{content:attr(data-label);display:block;font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:3px;font-weight:700;}
    .actions-cell{flex-direction:row;}
    .hd-col, .atb-col, .metas-col, .dva-col, .cluster{min-width:0;}
    .dev-cluster{grid-template-columns:1fr;}
    .dev-cluster .sub-group{border-left:none;padding-left:0;border-top:1px dashed var(--line);padding-top:5px;margin-top:5px;}
    .dev-cluster .sub-group:first-child{border-top:none;padding-top:0;margin-top:0;}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
// Rede de segurança: se qualquer erro acontecer, mostra na tela em vez de deixar a página em branco.
window.addEventListener('error', function(ev){
  try{
    const app = document.getElementById('app');
    if(app && !app.dataset.errorShown){
      app.dataset.errorShown = '1';
      app.innerHTML = '<div style="max-width:640px;margin:60px auto;background:#fff;border:2px solid #B3261E;border-radius:14px;padding:24px;font-family:sans-serif;">'
        + '<h1 style="font-size:17px;color:#B3261E;margin:0 0 10px;">Ocorreu um erro ao carregar o app</h1>'
        + '<p style="color:#333;line-height:1.6;">Mensagem técnica (envie um print disso para quem está te ajudando a configurar):</p>'
        + '<pre style="white-space:pre-wrap;background:#FBEAE9;padding:10px;border-radius:8px;font-size:12.5px;color:#7a1a15;">' + (ev.message||'erro desconhecido') + '\nArquivo: ' + (ev.filename||'-') + ' linha ' + (ev.lineno||'-') + '</pre>'
        + '</div>';
    }
  }catch(e){}
});
</script>
<script>
const FIRESTORE_COLLECTION = 'uti_rounds_data';
const LS_KEY = 'uti_firebase_config';

let firebaseReady = false;
let dbFire = null;

function initFirebase(cfg){
  firebase.initializeApp(cfg);
  dbFire = firebase.firestore();
  firebaseReady = true;
  try{
    dbFire.enablePersistence({ synchronizeTabs: true }).catch(err=>{
      if(err.code === 'failed-precondition'){
        console.warn('Persistência offline não pôde ser ativada: múltiplas abas sem sincronização. Tente com apenas uma aba aberta.');
      } else if(err.code === 'unimplemented'){
        console.warn('Este navegador não suporta o modo offline do Firestore.');
      }
    });
  }catch(e){}
}

// Tenta extrair o objeto de configuração de qualquer texto colado, mesmo com
// "import { ... } from ..." ou outros trechos de código em volta.
function extractBalancedObject(text, anchorWord){
  const anchorIdx = text.indexOf(anchorWord);
  if(anchorIdx===-1) throw new Error('Não encontrei "'+anchorWord+'" no texto colado. Confira se copiou o bloco de configuração do Firebase (com apiKey, projectId, etc).');
  const start = text.lastIndexOf('{', anchorIdx);
  if(start===-1) throw new Error('Não encontrei o "{" de abertura da configuração.');
  let depth = 0;
  for(let i=start; i<text.length; i++){
    if(text[i]==='{') depth++;
    else if(text[i]==='}'){
      depth--;
      if(depth===0) return text.slice(start, i+1);
    }
  }
  throw new Error('Não encontrei o "}" de fechamento da configuração.');
}
function parsePastedConfig(text){
  const objText = extractBalancedObject(text, 'apiKey');
  const cfg = new Function('return (' + objText + ')')();
  if(!cfg || !cfg.apiKey || !cfg.projectId) throw new Error('O texto colado não parece ter "apiKey" e "projectId". Confira se copiou o bloco certo do Firebase.');
  return cfg;
}

// ---- Camada de armazenamento (substitui o antigo window.storage do Claude) ----
async function fsGet(key){
  if(!firebaseReady) return null;
  try{
    const doc = await dbFire.collection(FIRESTORE_COLLECTION).doc(key).get();
    if(!doc.exists) return null;
    return { key, value: doc.data().value };
  }catch(e){ return null; }
}
async function fsSet(key, value){
  if(!firebaseReady) throw new Error('Firebase não configurado');
  await dbFire.collection(FIRESTORE_COLLECTION).doc(key).set({
    value, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  });
  return { key, value };
}
async function fsDelete(key){
  if(!firebaseReady) return null;
  await dbFire.collection(FIRESTORE_COLLECTION).doc(key).delete();
  return { key, deleted:true };
}
async function fsList(prefix){
  if(!firebaseReady) return { keys: [] };
  try{
    const snap = await dbFire.collection(FIRESTORE_COLLECTION)
      .where(firebase.firestore.FieldPath.documentId(), '>=', prefix)
      .where(firebase.firestore.FieldPath.documentId(), '<', prefix + '\uf8ff')
      .get();
    return { keys: snap.docs.map(d=>d.id) };
  }catch(e){ return { keys: [] }; }
}
// Shim com a mesma "forma" da API usada no resto do app, agora rodando no Firebase.
window.storage = {
  get: (key, _shared) => fsGet(key),
  set: (key, value, _shared) => fsSet(key, value),
  delete: (key, _shared) => fsDelete(key),
  list: (prefix, _shared) => fsList(prefix)
};

// ---- Tela de configuração (primeira vez neste navegador/aparelho) ----
function showConfigScreen(errorMsg){
  const app = document.getElementById('app');
  app.innerHTML = '';
  const box = document.createElement('div');
  box.style.cssText = 'max-width:600px;margin:40px auto;background:#fff;border:1px solid #E2E7EA;border-radius:14px;padding:26px;font-family:Arial,sans-serif;';
  box.innerHTML = `
    <h1 style="font-size:18px;margin:0 0 10px;color:#1F2937;">Conectar ao Firebase</h1>
    <p style="color:#647079;line-height:1.6;font-size:13.5px;">
      Cole abaixo o bloco de configuração do seu projeto Firebase (copiado do console, em
      <b>Configurações do projeto → Seus apps → Web</b>). Pode colar exatamente como aparece lá,
      com "const firebaseConfig = {...}" e tudo — o app entende sozinho.
    </p>
    ${errorMsg ? `<p style="background:#FBEAE9;color:#B3261E;padding:10px 12px;border-radius:8px;font-size:12.5px;">${errorMsg}</p>` : ''}
    <textarea id="cfgInput" rows="10" placeholder='const firebaseConfig = {
  apiKey: "...",
  authDomain: "...",
  projectId: "...",
  ...
};' style="width:100%;font-family:monospace;font-size:12px;padding:10px;border-radius:8px;border:1px solid #E2E7EA;box-sizing:border-box;"></textarea>
    <button id="cfgSaveBtn" style="margin-top:14px;padding:10px 18px;font-size:14px;font-weight:600;border-radius:8px;border:1px solid #0F6E6E;background:#0F6E6E;color:#fff;cursor:pointer;">Salvar e continuar</button>
    <p style="color:#647079;font-size:11.5px;margin-top:14px;">
      Isso só precisa ser feito uma vez em cada navegador/aparelho que você usar. Se ainda não criou
      o projeto, acesse <span style="font-family:monospace;">console.firebase.google.com</span>,
      crie um projeto grátis, ative o <b>Firestore Database</b> (modo de teste) e registre um app Web
      para pegar essa configuração.
    </p>`;
  app.appendChild(box);
  document.getElementById('cfgSaveBtn').addEventListener('click', async ()=>{
    const text = document.getElementById('cfgInput').value;
    try{
      const cfg = parsePastedConfig(text);
      initFirebase(cfg);
      // testa a conexão de verdade antes de salvar
      await dbFire.collection(FIRESTORE_COLLECTION).doc('_ping').set({value:'ok', updatedAt: firebase.firestore.FieldValue.serverTimestamp()});
      localStorage.setItem(LS_KEY, JSON.stringify(cfg));
      boot();
    }catch(e){
      showConfigScreen('Não consegui conectar: ' + (e.message||e) + ' — confira se o Firestore Database já foi criado no console (Build → Firestore Database → Criar banco de dados) e tente novamente.');
    }
  });
}
</script>

  'Ampicilina-Sulbactam': ['ampicilina/sulbactam','ampicilina-sulbactam','unasyn','sulbactam'],

function detectAntibioticsInText(text){

    if(u && u.value){ const parsed = JSON.parse(u.value); if(Array.isArray(parsed) && parsed.length) units = parsed; }
  }catch(e){}
  try{

    if(c && c.value) current = c.value;
  }catch(e){}
  if(!units.includes(current)) current = units[0];
  state.units = units; state.currentUnit = current;

  let bedCounts = {};

    if(bc && bc.value){ const parsed = JSON.parse(bc.value); if(parsed && typeof parsed==='object') bedCounts = parsed; }
  }catch(e){}
  let bedCountsChanged = false;

async function removeUnit(name){
  const latest = await fetchLatestUnits();
  let remaining = latest.filter(u=>u!==name);
  if(remaining.length===0) remaining = ['UTI 1'];
  const fallback = remaining[0];
  const affected = state.patients.filter(p => patientUnit(p) === name);

  let message;
  if(affected.length>0){
    message = `ATENÇÃO: ainda há ${affected.length} paciente(s) gravado(s) na unidade "${name}".\n\nSe você confirmar, esses pacientes serão movidos automaticamente para a unidade "${fallback}" (nenhum dado será apagado), e a unidade "${name}" será removida da lista.\n\nTem certeza que quer excluir "${name}"?`;
  } else {
    message = `Remover a unidade "${name}"? Não há pacientes nela. Essa ação não pode ser desfeita.`;
  }
  if(!confirm(message)) return;

  if(affected.length>0){
    affected.forEach(p=>{ p.unidade = fallback; });
    await Promise.all(affected.map(p=>savePatient(p)));
  }
  state.units = remaining;
  if(state.currentUnit===name) state.currentUnit = fallback;
  try{ await window.storage.set('units_index', JSON.stringify(state.units), false); }catch(e){}
  try{ await window.storage.set('current_unit', state.currentUnit, false); }catch(e){}
  showToast(affected.length>0
    ? `Unidade "${name}" removida. ${affected.length} paciente(s) movido(s) para "${fallback}".`
    : `Unidade "${name}" removida.`);
  render();
}

// Zera a meta do dia automaticamente se ela não foi reconfirmada/reescrita hoje —
// evita que uma meta esquecida fique "pendurada" indefinidamente, dia após dia.
function resetStaleMetas(){
  const today = todayStr();
  state.patients.forEach(p=>{
    if(p.status!=='ativo') return;
    if(!p.metasDate){
      // primeira vez com esse rastreamento: só passa a acompanhar a partir de agora, sem apagar nada existente
      if(p.metas){ p.metasDate = today; savePatient(p); }
      return;
    }
    if(p.metasDate!==today && p.metas){
      p.metas = '';
      p.metasDate = today;
      p.examesAlertados = {};
      savePatient(p);
    }
  });
}
// Reconhece menções a exames de imagem dentro do texto livre de Metas, pra disparar o
// alerta do Telegram sozinho, sem precisar de botão/seletor separado.
const EXAME_KEYWORDS = {
  exame_tc: [/\btc\b/i, /tomografia/i, /angiotc/i],
  exame_eda: [/\beda\b/i, /endoscopia/i],
  exame_usg: [/\busg\b/i, /ultrassom/i, /ultrassonografia/i],
  exame_eco: [/\beco\b/i, /ecocardiograma/i, /ecotransesof/i, /ecotranstorac/i],
  exame_ecg: [/\becg\b/i, /eletrocardiograma/i],
};
function detectExamesInText(text){
  if(!text) return [];
  return Object.keys(EXAME_KEYWORDS).filter(tipo => EXAME_KEYWORDS[tipo].some(rx => rx.test(text)));
}
function updateMetasField(id, value){
  const p = state.patients.find(x=>x.id===id); if(!p) return;
  const oldExames = new Set(detectExamesInText(p.metas));
  p.metas = value;
  p.metasDate = todayStr();
  p.ultimaAtualizacao = todayStr();
  const newExames = detectExamesInText(value);
  if(!p.examesAlertados) p.examesAlertados = {};
  newExames.forEach(tipo=>{
    if(!oldExames.has(tipo) && !p.examesAlertados[tipo]){
      p.examesAlertados[tipo] = todayStr();
      sendTelegramAlert(tipo, p);
    }
  });
  Object.keys(p.examesAlertados).forEach(tipo=>{ if(!newExames.includes(tipo)) delete p.examesAlertados[tipo]; });
  savePatient(p);
  renderStatsOnly();
}
async function healUnitsList(){
  const foundUnits = new Set(state.patients.map(p=>patientUnit(p)));
  const latest = await fetchLatestUnits();
  let changed = false;
  foundUnits.forEach(u=>{ if(u && !latest.includes(u)){ latest.push(u); changed = true; } });
  if(changed){
    state.units = latest;
    try{ await window.storage.set('units_index', JSON.stringify(state.units), false); }catch(e){}
  } else {
    state.units = latest;
  }

function confirmAlta(id, dataAlta, situacaoAlta, tipoAlta, altaRetida, altaRetidaDataPronta){
  const p = state.patients.find(x=>x.id===id); if(!p) return;
  p.status='alta'; p.dataAlta=dataAlta||todayStr(); p.situacaoAlta=situacaoAlta||''; p.tipoAlta=tipoAlta||'';
  p.altaRetida = altaRetida || 'nao'; p.altaRetidaDataPronta = (altaRetida==='sim') ? (altaRetidaDataPronta||'') : '';
  savePatient(p); state.modal=null;
  showToast(`${p.nome||'Paciente'} teve alta registrada e foi arquivado(a).`);
  if(tipoAlta==='obito'){ sendObitoToIntegration(p); }
  render();
}
function revertAlta(id){
  const p = state.patients.find(x=>x.id===id); if(!p) return;
  p.status='ativo'; p.dataAlta=null; p.situacaoAlta=null; p.tipoAlta=''; p.altaRetida=''; p.altaRetidaDataPronta='';
  savePatient(p); state.modal=null;
  showToast(`Alta revertida. ${p.nome||'Paciente'} voltou para a lista ativa.`);
  render();
}
function deletePatient(id){
  const p = state.patients.find(x=>x.id===id); if(!p) return;
  if(!confirm(`Remover definitivamente o registro de ${p.nome||'paciente'}? Essa ação não pode ser desfeita.`)) return;
  window.storage.delete('patient:'+id, false).catch(()=>{});
  state.patients = state.patients.filter(x=>x.id!==id);
  render();
}
function bedInRange(leito, min, max){
  const n = parseInt(String(leito||'').replace(/\D/g,''), 10);
  if(isNaN(n)) return false;
  return n>=min && n<=max;
}
function searchByBedRange(min, max){
  const results = state.patients.filter(p => patientUnit(p)===state.currentUnit && bedInRange(p.leito, min, max));
  state.modal.results = results;
  state.modal.excluded = new Set();
  render();
}
async function bulkDeleteSelected(){
  const list = (state.modal.results||[]).filter(p=>!state.modal.excluded.has(p.id));
  if(list.length===0){ showToast('Nenhum paciente selecionado.'); return; }
  const names = list.map(p=>`${p.nome||'(sem nome)'} (leito ${p.leito||'—'})`).join('\n');
  if(!confirm(`Excluir DEFINITIVAMENTE ${list.length} paciente(s)?\n\n${names}\n\nEssa ação NÃO pode ser desfeita.`)) return;
  await Promise.all(list.map(p=>window.storage.delete('patient:'+p.id, false).catch(()=>{})));
  const idsToRemove = new Set(list.map(p=>p.id));
  state.patients = state.patients.filter(p=>!idsToRemove.has(p.id));
  state.modal = null;
  showToast(`${list.length} paciente(s) excluído(s) definitivamente.`);
  render();
}

// ---------- Excel export ----------
function dvaString(p){ return DVA_DRUGS.filter(d=>p.dva && p.dva[d]).join(', ') || '—'; }
function sedacaoString(p){
  const drugs = SEDACAO_DRUGS.filter(d=>p.sedacaoDrogas && p.sedacaoDrogas[d]).join(', ');
  const obs = p.sedacao || '';
  if(drugs && obs) return drugs + ' — ' + obs;
  return drugs || obs || '—';
}
function atbString(pOrSnap){
  return pOrSnap.atb || '—';
}
function siteDateString(obj, siteOpts){
  if(!obj) return '—';
  const local = obj.local ? optLabel(siteOpts, obj.local) : '';
  const data = obj.data ? fmtDateBR(obj.data) : '';
  if(!local && !data) return '—';
  return [local, data].filter(Boolean).join(' — ');
}

function autoWidths(rows){
  if(!rows.length) return [];
  const keys = Object.keys(rows[0]);
  return keys.map(k=>{ const cap = k==='Metas do Dia' ? 60 : 42; const maxLen = Math.max(k.length, ...rows.map(r=>String(r[k]||'').length)); return {wch: Math.min(Math.max(maxLen+2,10),cap)}; });
}
function buildWorkbookSingle(list, sheetName){
  const rows = list.map(patientToRow);
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{'Paciente':''}]);
  ws['!cols'] = autoWidths(rows);
  XLSX.utils.book_append_sheet(wb, ws, sheetName||'Rodada');
  return wb;
}
function exportXLSX(list, filename, sheetName){
  if(typeof XLSX==='undefined'){ showToast('Não foi possível carregar o Excel agora. Tente novamente.'); return; }
  XLSX.writeFile(buildWorkbookSingle(list, sheetName), filename);
  showToast('Excel baixado.');
}
function buildWorkbookAtivosEArquivo(){
  const ativos = sortByLeito(state.patients.filter(p=>p.status==='ativo' && patientUnit(p)===state.currentUnit));
  const altas = sortByLeito(state.patients.filter(p=>p.status==='alta' && patientUnit(p)===state.currentUnit));
  const wb = XLSX.utils.book_new();
  const wsA = XLSX.utils.json_to_sheet(ativos.length ? ativos.map(patientToRow) : [{'Paciente':''}]);
  wsA['!cols'] = autoWidths(ativos.map(patientToRow));
  XLSX.utils.book_append_sheet(wb, wsA, 'Ativos');
  const wsB = XLSX.utils.json_to_sheet(altas.length ? altas.map(patientToRow) : [{'Paciente':''}]);
  wsB['!cols'] = autoWidths(altas.map(patientToRow));
  XLSX.utils.book_append_sheet(wb, wsB, 'Arquivo (todas altas)');
  const safeUnit = (state.currentUnit||'UTI').replace(/[^a-zA-Z0-9]+/g,'_');
  const filename = `${safeUnit}_rodada_completa_${todayStr()}.xlsx`;
  return { wb, filename };
}
function exportAllXLSX(){
  const { wb, filename } = buildWorkbookAtivosEArquivo();
  XLSX.writeFile(wb, filename);
  showToast('Excel baixado.');
}
function exportFullBackupXLSX(){
  if(typeof XLSX==='undefined'){ showToast('Não foi possível carregar o Excel agora. Tente novamente.'); return; }
  const wb = XLSX.utils.book_new();

  // Aba 1: estado atual de todos os pacientes, de todas as unidades
  const allPatients = sortByLeito(state.patients.slice());
  const patientRows = allPatients.map(p => Object.assign({ 'Unidade': patientUnit(p) }, patientToRow(p)));
  const ws1 = XLSX.utils.json_to_sheet(patientRows.length ? patientRows : [{'Paciente':''}]);
  ws1['!cols'] = autoWidths(patientRows);
  XLSX.utils.book_append_sheet(wb, ws1, 'Pacientes (todas unidades)');

  // Aba 2: TODO o histórico diário já registrado, de todos os pacientes e unidades
  const historyRows = [];
  allPatients.forEach(p=>{
    (p.history||[]).slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(snap=>{
      historyRows.push(Object.assign({ 'Unidade': patientUnit(p) }, snapshotToReportRow(p, snap)));
    });
  });
  const ws2 = XLSX.utils.json_to_sheet(historyRows.length ? historyRows : [{'Paciente':''}]);
  ws2['!cols'] = autoWidths(historyRows);
  XLSX.utils.book_append_sheet(wb, ws2, 'Histórico diário completo');

  XLSX.writeFile(wb, `BACKUP_COMPLETO_${todayStr()}.xlsx`);
  showToast(`Backup exportado: ${patientRows.length} paciente(s), ${historyRows.length} registro(s) de histórico.`);
}

// ---------- Print (resumo: nome, leito, atb, dva, sedação, metas) ----------
function printSummary(){
  const ativos = sortByLeito(state.patients.filter(p=>p.status==='ativo' && patientUnit(p)===state.currentUnit));
  if(ativos.length===0){ showToast('Nenhum paciente ativo para imprimir.'); return; }

  const rowsHtml = ativos.map(p=>{
    const metas = (p.metas||'—').replace(/</g,'&lt;').replace(/\n/g,'<br>');
    const esc = (s)=> String(s||'—').replace(/</g,'&lt;');
    return `<tr>
      <td>${esc(p.leito)}</td>
      <td><b>${esc(p.nome)}</b></td>
      <td>${esc(p.hipotese)}</td>
      <td>${esc(atbString(p))}</td>
      <td>${esc(dvaString(p))}</td>
      <td>${esc(sedacaoString(p))}</td>
      <td class="metas-print">${metas}</td>
    </tr>`;
  }).join('');

  const html = `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
  <title>Visita Multidisciplinar - Resumo ${fmtDateBR(todayStr())}</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;color:#1a1a1a;margin:24px;}
    h2{margin:0 0 2px;font-size:18px;}
    .sub{font-size:12px;color:#555;margin-bottom:14px;}
    .print-btn{margin-bottom:16px;padding:9px 16px;font-size:14px;font-weight:600;border-radius:8px;border:1px solid #0F6E6E;background:#0F6E6E;color:#fff;cursor:pointer;}
    table{width:100%;border-collapse:collapse;}
    th,td{border:1px solid #999;padding:7px 9px;font-size:12.5px;text-align:left;vertical-align:top;}
    th{background:#eee;}
    .metas-print{white-space:pre-line;}
    @media print{ .print-btn{display:none;} body{margin:8mm;} }
  </style></head>
  <body>
    <button class="print-btn" onclick="window.print()">Imprimir / Salvar em PDF</button>
    <h2>Visita Multidisciplinar — Resumo</h2>
    <div class="sub">Data: ${fmtDateBR(todayStr())}</div>
    <table>
      <thead><tr><th>Leito</th><th>Nome</th><th>HD</th><th>ATB</th><th>DVA</th><th>Sedação</th><th>Metas</th></tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  </body></html>`;

  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.target = '_blank'; a.rel = 'noopener';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 30000);
  showToast('Abrindo a folha de impressão em uma nova aba...');
}

// ---------- DOM helpers ----------
function el(tag, attrs, children){
  const e = document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class') e.className=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else if(k==='disabled'){ if(v) e.setAttribute('disabled','disabled'); }
    else if(v!==undefined && v!==null) e.setAttribute(k, v);
  });
  (children||[]).forEach(c=>e.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return e;
}
function selectField(value, options, onchange, archived){
  if(archived) return el('span',{},[optLabel(options,value)||'—']);
  const sel = el('select',{onchange:e=>onchange(e.target.value)});
  sel.appendChild(el('option',{value:''},['—']));
  options.forEach(([v,l])=>{ const o=el('option',{value:v},[l]); if(value===v) o.setAttribute('selected','selected'); sel.appendChild(o); });
  return sel;
}
function drugChips(patientId, groupField, drugs, current, archived){
  if(archived){
    const selected = drugs.filter(d=>current && current[d]);
    if(selected.length===0) return el('span',{},['—']);
    const wrap = el('div',{},[]);
    selected.forEach(d=>wrap.appendChild(el('span',{class:'chip-static'},[d])));
    return wrap;
  }
  const wrap = el('div',{class:'chip-list'});
  drugs.forEach(d=>{
    const on = !!(current && current[d]);
    wrap.appendChild(el('button',{type:'button', class:'chip'+(on?' on':''), onclick:()=>toggleDrug(patientId, groupField, d)},[d]));
  });
  return wrap;
}
function miniField(label, control){
  return el('div',{class:'mini-field'},[ el('span',{class:'ml'},[label]), control ]);
}

function renderStatsOnly(){
  const host = document.getElementById('stats-host');
  if(host) host.replaceWith(buildStats());
}
function patientUnit(p){ return p.unidade || (state.units[0] || 'UTI 1'); }

function isWeekendToday(){
  const dow = new Date(todayStr()+'T00:00:00').getDay();
  return dow===0 || dow===6; // domingo ou sábado
}
function buildStats(){
  const ativos = state.patients.filter(p=>p.status==='ativo' && patientUnit(p)===state.currentUnit);
  const total = ativos.length;
  const camPos = ativos.filter(p=>p.camIcu==='sim').length;
  const naoAtualizados = isWeekendToday() ? 0 : ativos.filter(p=>p.ultimaAtualizacao!==todayStr()).length;
  const altasHoje = state.patients.filter(p=>p.status==='alta' && p.dataAlta===todayStr() && patientUnit(p)===state.currentUnit).length;
  const comCVC = ativos.filter(p=>p.cvc && p.cvc.local).length;
  const comPAI = ativos.filter(p=>p.pai && p.pai.local).length;
  const comPICC = ativos.filter(p=>p.picc && p.picc.local).length;
  const comSonda = ativos.filter(p=>p.sondaVesical && p.sondaVesical.data).length;
  const comATB = ativos.filter(p=>!!p.atb).length;
  const comPaliativos = ativos.filter(p=>p.cuidadosPaliativos==='sim').length;
  const treFilled = ativos.filter(p=>treApplies(p) && !!p.tre);
  const treSim = treFilled.filter(p=>p.tre==='sim').length;
  const wrap = el('div',{class:'stats', id:'stats-host'});
  wrap.appendChild(statCard(total,'Pacientes ativos',''));
  wrap.appendChild(statCard(camPos+' de '+total,'Delirium (CAM-ICU +)', camPos>0?'alert':''));
  wrap.appendChild(statCard(treFilled.length? (treSim+' de '+treFilled.length) : '—','TRE realizado hoje',''));
  wrap.appendChild(statCard(naoAtualizados,'Sem evolução hoje'+(isWeekendToday()?' (fim de semana)':''), naoAtualizados>0?'warn':'ok'));
  wrap.appendChild(statCard(altasHoje,'Altas hoje',''));
  wrap.appendChild(statCard(comCVC+' de '+total,'Com CVC',''));
  wrap.appendChild(statCard(comPICC+' de '+total,'Com PICC',''));
  wrap.appendChild(statCard(comPAI+' de '+total,'Com PAI',''));
  wrap.appendChild(statCard(comSonda+' de '+total,'Com sonda vesical',''));
  wrap.appendChild(statCard(comATB+' de '+total,'Em uso de ATB',''));
  wrap.appendChild(statCard(comPaliativos+' de '+total,'Cuidados paliativos',''));
  return wrap;
}
function statCard(n,label,cls){
  const txt = String(n);
  const fontSize = txt.length>6 ? '15px' : '20px';
  return el('div',{class:'stat '+(cls||'')},[el('div',{class:'n', style:'font-size:'+fontSize+';'},[txt]), el('div',{class:'l'},[label])]);
}

function collectReportRows(from, to, unit){
  const filterFn = unit==='ALL_UNITS' ? (()=>true) : (p=>patientUnit(p)===(unit || state.currentUnit));
  const rows = [];
  state.patients.filter(filterFn).forEach(p=>{
    (p.history||[]).forEach(snap=>{
      if(snap.date >= from && snap.date <= to) rows.push({p, snap});
    });
  });
  rows.sort((a,b)=> a.snap.date===b.snap.date ? (a.p.leito||'').localeCompare(b.p.leito||'','pt',{numeric:true}) : a.snap.date.localeCompare(b.snap.date));
  return rows;
}
function reportIndicator(rows, field, value){

// TRE (Teste de Respiração Espontânea) só se aplica a quem tem tubo orotraqueal,
// ou traqueostomia associada a ventilação mecânica ativa.
function treApplies(pOrSnap){
  const hasETT = !!(pOrSnap.intubacaoOrotraqueal && pOrSnap.intubacaoOrotraqueal.data);
  const hasTQT = !!(pOrSnap.traqueostomia && pOrSnap.traqueostomia.data);
  const onVM = !!pOrSnap.ventModalidade && pOrSnap.ventModalidade !== 'nao_se_aplica';
  return hasETT || (hasTQT && onVM);
}
function diffDays(dateA, dateB){
  const a = new Date(dateA+'T00:00:00'); const b = new Date(dateB+'T00:00:00');
  return Math.round((b-a)/86400000);
}
// Converte texto digitado em dd/mm/aaaa (ou d/m/aaaa) para o formato ISO aaaa-mm-dd usado internamente.
function parseBRDate(text){
  const m = String(text||'').trim().match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})$/);
  if(!m) return null;
  const dd = m[1].padStart(2,'0'), mm = m[2].padStart(2,'0'), yyyy = m[3];
  const iso = `${yyyy}-${mm}-${dd}`;
  const d = new Date(iso+'T00:00:00');
  if(isNaN(d.getTime())) return null;
  return iso;
}
// Aceita só dia/mês (sem ano) e infere o ano automaticamente: usa o ano atual, ou o
// anterior se a data ainda não tivesse acontecido esse ano (evita datas no futuro).
function parseBRDateNoYear(text, referenceDateISO){
  const m = String(text||'').trim().match(/^(\d{1,2})[\/\-.](\d{1,2})$/);
  if(!m) return null;
  const dd = m[1].padStart(2,'0'), mm = m[2].padStart(2,'0');
  const ref = new Date((referenceDateISO||todayStr())+'T00:00:00');
  let year = ref.getFullYear();
  let iso = `${year}-${mm}-${dd}`;
  let d = new Date(iso+'T00:00:00');
  if(isNaN(d.getTime())) return null;
  if(d.getTime() > ref.getTime()){
    year -= 1;
    iso = `${year}-${mm}-${dd}`;
    d = new Date(iso+'T00:00:00');
    if(isNaN(d.getTime())) return null;
  }
  return iso;
}
function fmtDayMonth(iso){
  if(!iso) return '';
  const parts = iso.split('-');
  if(parts.length!==3) return '';
  return parts[2]+'/'+parts[1];
}
// Lê o texto do campo ATB no padrão "Rocefin di 07/07 + Azitro di 08/07" (ou
// "Rocefin + Azitro di 07/07" quando compartilham a mesma data no fim do grupo).
function parseATBSegments(atbText, referenceDateISO){
  if(!atbText) return [];
  const segments = atbText.split('+').map(s=>s.trim()).filter(Boolean);
  const dateRegex = /(?:\bdi\b|\bdia\b|\bd\/?\b)?\s*(\d{1,2})[\/\-.](\d{1,2})(?:[\/\-.](\d{2,4}))?\s*$/i;
  const results = [];
  let pending = [];
  segments.forEach(seg=>{
    const m = seg.match(dateRegex);
    if(m){
      const dd = m[1].padStart(2,'0'), mm = m[2].padStart(2,'0');
      let iso;
      if(m[3]){
        const yyyy = m[3].length===2 ? '20'+m[3] : m[3];
        iso = `${yyyy}-${mm}-${dd}`;
        if(isNaN(new Date(iso+'T00:00:00').getTime())) iso = null;
      } else {
        iso = parseBRDateNoYear(`${dd}/${mm}`, referenceDateISO);
      }
      const nome = seg.slice(0, m.index).replace(/\b(di|dia|d)\b\s*$/i,'').trim();
      pending.push({ nome: nome || seg, data: iso });
      pending.forEach(e=>{ if(!e.data) e.data = iso; });
      results.push(...pending);
      pending = [];
    } else {
      pending.push({ nome: seg, data: null });
    }
  });
  results.push(...pending);
  return results.filter(r=>r.nome);
}
// Aproximação: uma linha de "metas" é considerada atingida quando:
// (1) aparecia num dia e não aparece mais (com o mesmo texto) no registro seguinte; ou
// (2) é uma meta de dieta ("iniciar dieta...") e um dia posterior traz "dieta" + "meta"/"alvo"; ou
// (3) é uma meta de ATB ("iniciar/manter ATB...") e um dia posterior já tem ATB de fato preenchido.
function computeGoalsAchieved(from, to){
  const achieved = [];
  state.patients.filter(p=>patientUnit(p)===state.currentUnit).forEach(p=>{
    const hist = (p.history||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
    for(let i=0; i<hist.length-1; i++){
      if(hist[i].date<from || hist[i].date>to) continue;
      const linesToday = (hist[i].metas||'').split('\n').map(s=>s.trim()).filter(Boolean);
      if(linesToday.length===0) continue;
      const linesNextSet = new Set((hist[i+1].metas||'').split('\n').map(s=>s.trim().toLowerCase()).filter(Boolean));
      linesToday.forEach(line=>{
        const ll = line.toLowerCase();
        if(!linesNextSet.has(ll)){
          achieved.push({ nome:p.nome, leito:p.leito, meta:line, dataRegistrada:hist[i].date, dataConcluida:hist[i+1].date, motivo:'não aparece mais' });
          return;
        }
        if(ll.includes('dieta') && ll.includes('inici')){
          for(let j=i+1;j<hist.length;j++){
            const hit = (hist[j].metas||'').split('\n').map(s=>s.trim().toLowerCase()).find(l2=>l2.includes('dieta') && (l2.includes('meta')||l2.includes('alvo')));
            if(hit){ achieved.push({ nome:p.nome, leito:p.leito, meta:line, dataRegistrada:hist[i].date, dataConcluida:hist[j].date, motivo:'dieta em meta/alvo' }); break; }
          }
        } else if((ll.includes('atb') || ll.includes('antibiot')) && (ll.includes('inici') || ll.includes('manter'))){
          for(let j=i+1;j<hist.length;j++){
            const hasAtb = !!hist[j].atb;
            if(hasAtb){ achieved.push({ nome:p.nome, leito:p.leito, meta:line, dataRegistrada:hist[i].date, dataConcluida:hist[j].date, motivo:'ATB em uso' }); break; }
          }
        }
      });
    }
  });
  return achieved;
}
// Tempo de dispositivo (CVC/Shilley/PAI): agrupa períodos contínuos de uso a partir
// da data de inserção informada, até o primeiro dia em que deixa de aparecer preenchido.
function computeDeviceDurations(deviceKey, requiresLocal, unit){
  const filterFn = unit==='ALL_UNITS' ? (()=>true) : (p=>patientUnit(p)===(unit || state.currentUnit));
  const concluded = []; // {nome, leito, local, dataInsercao, dataRemocao, dias}
  const ongoing = [];   // {nome, leito, local, dataInsercao, diasAteAgora}
  state.patients.filter(filterFn).forEach(p=>{
    const hist = (p.history||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
    let active = null;
    hist.forEach(snap=>{
      const dev = snap[deviceKey];
      const hasDevice = requiresLocal ? !!(dev && dev.local) : !!(dev && dev.data);
      const localValue = (dev && dev.local) || 'presente';
      if(hasDevice){
        const insercao = dev.data || snap.date;
        if(!active || active.local!==localValue || active.dataInsercao!==insercao){
          if(active) ongoing.push({nome:p.nome, leito:p.leito, local:active.local, dataInsercao:active.dataInsercao, diasAteAgora: diffDays(active.dataInsercao, active.lastSeenDate)});
          active = { local: localValue, dataInsercao: insercao, lastSeenDate: snap.date };
        } else {
          active.lastSeenDate = snap.date;
        }
      } else if(active){
        concluded.push({ nome:p.nome, leito:p.leito, local:active.local, dataInsercao:active.dataInsercao, dataRemocao:snap.date, dias: diffDays(active.dataInsercao, snap.date) });
        active = null;
      }
    });
    if(active) ongoing.push({nome:p.nome, leito:p.leito, local:active.local, dataInsercao:active.dataInsercao, diasAteAgora: diffDays(active.dataInsercao, active.lastSeenDate)});
  });
  const avg = concluded.length ? Math.round((concluded.reduce((s,c)=>s+c.dias,0)/concluded.length)*10)/10 : null;
  return { concluded, ongoing, avg };
}
function buildWorkbookRelatorio(rows){
  const data = rows.map(r=>snapshotToReportRow(r.p, r.snap));
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = autoWidths(data);
  XLSX.utils.book_append_sheet(wb, ws, 'Relatório');
  const safeUnit = (state.currentUnit||'UTI').replace(/[^a-zA-Z0-9]+/g,'_');
  const filename = `${safeUnit}_relatorio_${state.reportFrom}_a_${state.reportTo}.xlsx`;
  return { wb, filename };
}
function exportReportXLSX(rows){
  if(rows.length===0){ showToast('Nenhum registro no período selecionado.'); return; }
  const { wb, filename } = buildWorkbookRelatorio(rows);
  XLSX.writeFile(wb, filename);
  showToast('Excel baixado.');
}

  state.patients.filter(p=>patientUnit(p)===state.currentUnit && p.atb).forEach(p=>{
    const ref = p.status==='alta' ? (p.dataAlta||todayStr()) : todayStr();
    parseATBSegments(p.atb, ref).forEach(seg=>{
      const dias = seg.data ? diffDays(seg.data, ref) : null;
      atbDatasRows.push({ nome:p.nome, leito:p.leito, antibiotico:seg.nome, dataInicio:seg.data, dias });
    });
  });
  if(atbDatasRows.length===0){
    wrap.appendChild(el('div',{class:'empty-state', style:'padding:24px;'},['Nenhuma data reconhecida no texto de ATB ainda. Use o padrão "nome di dd/mm" para aparecer aqui.']));
  } else {
    const adTableWrap = el('div',{class:'table-wrap'});
    const adt = el('table',{});
    const adthead = el('thead',{}); const adtrh = el('tr',{});
    ['Paciente','Leito','Antibiótico (texto)','Data de início','Dias de uso'].forEach(h=>adtrh.appendChild(el('th',{},[h])));
    adthead.appendChild(adtrh); adt.appendChild(adthead);
    const adtbody = el('tbody',{});
    atbDatasRows.forEach(r=>{
      const tr = el('tr',{});
      [r.nome||'—', r.leito||'—', r.antibiotico, r.dataInicio?fmtDateBR(r.dataInicio):'—', r.dias!==null?String(r.dias):'—'].forEach(c=>tr.appendChild(el('td',{},[c])));
      adtbody.appendChild(tr);
    });
    adt.appendChild(adtbody); adTableWrap.appendChild(adt); wrap.appendChild(adTableWrap);
  }
  wrap.appendChild(el('p',{style:'font-size:11.5px;color:var(--muted);margin:10px 0 14px;'}));

  // ---- Altas por dia ----
  wrap.appendChild(el('h3',{style:'font-size:14px;margin:20px 0 8px;'},['Altas por dia no período']));
  const altasNoPeriodoLista = state.patients.filter(p=>p.status==='alta' && patientUnit(p)===state.currentUnit && p.dataAlta>=state.reportFrom && p.dataAlta<=state.reportTo);
  const altasPorDia = {};
  altasNoPeriodoLista.forEach(p=>{ altasPorDia[p.dataAlta] = (altasPorDia[p.dataAlta]||0) + 1; });
  const altasDatas = Object.keys(altasPorDia).sort();
  if(altasDatas.length===0){
    wrap.appendChild(el('div',{class:'empty-state', style:'padding:24px;'},['Nenhuma alta registrada nesse período.']));
  } else {
    const tipoAltaStats = el('div',{class:'stats'});
    TIPO_ALTA_OPTS.forEach(([v,l])=>{
      const count = altasNoPeriodoLista.filter(p=>p.tipoAlta===v).length;
      tipoAltaStats.appendChild(statCard(count, l, v==='obito'&&count>0?'alert':''));
    });
    const semTipo = altasNoPeriodoLista.filter(p=>!p.tipoAlta).length;
    if(semTipo>0) tipoAltaStats.appendChild(statCard(semTipo, 'Sem tipo informado', 'warn'));
    const retidas = altasNoPeriodoLista.filter(p=>p.altaRetida==='sim');
    const diasRetidaLista = retidas.map(p=>p.altaRetidaDataPronta ? diffDays(p.altaRetidaDataPronta, p.dataAlta) : null).filter(d=>d!==null && d>=0);
    const mediaDiasRetida = diasRetidaLista.length ? Math.round((diasRetidaLista.reduce((s,d)=>s+d,0)/diasRetidaLista.length)*10)/10 : null;
    tipoAltaStats.appendChild(statCard(retidas.length, 'Altas retidas', retidas.length>0?'warn':''));
    if(mediaDiasRetida!==null) tipoAltaStats.appendChild(statCard(mediaDiasRetida+' dias', 'Média retida até sair', ''));
    wrap.appendChild(tipoAltaStats);

    const altasTableWrap = el('div',{class:'table-wrap'});
    const att = el('table',{});
    const atthead = el('thead',{}); const attrh = el('tr',{});
    ['Data','Altas efetivadas'].forEach(h=>attrh.appendChild(el('th',{},[h])));
    atthead.appendChild(attrh); att.appendChild(atthead);
    const attbody = el('tbody',{});
    altasDatas.forEach(d=>{
      const tr = el('tr',{});
      [fmtDateBR(d), String(altasPorDia[d])].forEach(c=>tr.appendChild(el('td',{},[c])));
      attbody.appendChild(tr);
    });
    att.appendChild(attbody); altasTableWrap.appendChild(att); wrap.appendChild(altasTableWrap);
    wrap.appendChild(el('p',{style:'font-size:11.5px;color:var(--muted);margin:10px 0 14px;'},[
      'Total de altas efetivadas no período (clique em "Dar alta"): ' + altasDatas.reduce((s,d)=>s+altasPorDia[d],0) + '.'
    ]));
    chartData.altas = { labels: altasDatas.map(fmtDateBR), values: altasDatas.map(d=>altasPorDia[d]) };
    wrap.appendChild(el('div',{class:'chart-box'},[
      el('div',{class:'chart-title'},['Altas por dia']),
      el('canvas',{id:'chart-altas', height:'110'})
    ]));
  }

  // ---- Média de permanência (diárias / saídas) ----
  wrap.appendChild(el('h3',{style:'font-size:14px;margin:20px 0 8px;'},['Tempo médio de permanência na unidade']));
  const altasNoPeriodo = state.patients.filter(p=>p.status==='alta' && patientUnit(p)===state.currentUnit && p.dataAlta>=state.reportFrom && p.dataAlta<=state.reportTo && p.dataAdmissao);
  const permanencias = altasNoPeriodo.map(p=>({ nome:p.nome, leito:p.leito, dataAdmissao:p.dataAdmissao, dataAlta:p.dataAlta, dias: diffDays(p.dataAdmissao, p.dataAlta) })).filter(x=>x.dias>=0);
  const totalDiarias = permanencias.reduce((s,x)=>s+x.dias, 0);
  const totalSaidas = permanencias.length;
  const mediaPermanencia = totalSaidas>0 ? Math.round((totalDiarias/totalSaidas)*10)/10 : null;
  const permStatsWrap = el('div',{class:'stats'});
  permStatsWrap.appendChild(statCard(mediaPermanencia!==null ? mediaPermanencia+' dias' : '—', 'Média de permanência', ''));
  permStatsWrap.appendChild(statCard(totalDiarias, 'Diárias (paciente-dia) no período', ''));
  permStatsWrap.appendChild(statCard(totalSaidas, 'Saídas (altas) no período', ''));
  wrap.appendChild(permStatsWrap);
  wrap.appendChild(el('p',{style:'font-size:11.5px;color:var(--muted);margin:0 0 14px;'},[
    'Cálculo: média de permanência = total de diárias (soma dos dias de internação de cada paciente que teve alta no período) dividido pelo número de saídas (altas) no período. Considera a data de admissão até a data de alta de cada paciente; pacientes ainda internados não entram nessa média.'
  ]));
  if(permanencias.length>0){
    const permTableWrap = el('div',{class:'table-wrap'});
    const pt = el('table',{});
    const pthead = el('thead',{}); const ptrh = el('tr',{});
    ['Paciente','Leito','Admissão','Alta','Dias de permanência'].forEach(h=>ptrh.appendChild(el('th',{},[h])));
    pthead.appendChild(ptrh); pt.appendChild(pthead);
    const ptbody = el('tbody',{});
    permanencias.sort((a,b)=>a.dataAlta.localeCompare(b.dataAlta)).forEach(x=>{
      const tr = el('tr',{});
      [x.nome||'—', x.leito||'—', fmtDateBR(x.dataAdmissao), fmtDateBR(x.dataAlta), String(x.dias)].forEach(c=>tr.appendChild(el('td',{},[c])));
      ptbody.appendChild(tr);
    });
    pt.appendChild(ptbody); permTableWrap.appendChild(pt); wrap.appendChild(permTableWrap);
  }

  wrap.appendChild(el('h3',{style:'font-size:14px;margin:18px 0 8px;'},['Detalhe de todas as rodadas do período']));

  const tableWrap = el('div',{class:'table-wrap'});
  const table = el('table',{});
  const thead = el('thead',{}); const trh = el('tr',{});
  ['Data','Leito','Paciente','HD','DVA','ATB','Sedação','CAM-ICU','TRE','Profilaxia TEV','Metas do dia'].forEach(h=>trh.appendChild(el('th',{},[h])));
  thead.appendChild(trh); table.appendChild(thead);
  const tbody = el('tbody',{});
  rows.forEach(({p,snap})=>{
    const tr = el('tr',{});
    const cells = [
      fmtDateBR(snap.date), p.leito||'—', p.nome||'—', snap.hipotese||'—',
      DVA_DRUGS.filter(d=>snap.dva && snap.dva[d]).join(', ')||'—',
      atbString(snap),
      (SEDACAO_DRUGS.filter(d=>snap.sedacaoDrogas && snap.sedacaoDrogas[d]).join(', ')) || snap.sedacao || '—',
      optLabel(SIMNAO_OPTS, snap.camIcu)||'—', optLabel(SIMNAO_OPTS, snap.tre)||'—', optLabel(TEV_OPTS, snap.tevProfilaxia)||'—'
    ];
    cells.forEach(c=>tr.appendChild(el('td',{},[String(c)])));
    tr.appendChild(el('td',{style:'white-space:pre-line;'},[snap.metas||'—']));
    tbody.appendChild(tr);
  });
  table.appendChild(tbody); tableWrap.appendChild(table); wrap.appendChild(tableWrap);
  wrap.appendChild(el('p',{style:'font-size:11.5px;color:var(--muted);margin-top:10px;'},[
    'Uma linha por rodada registrada (não por paciente) — se um paciente foi revisado em 5 dias diferentes no período, ele aparece 5 vezes, uma por data. Nome e leito exibidos são os mais recentes do cadastro do paciente.'
  ]));
  state._chartData = chartData;
  return wrap;
}

    const retidaSel = el('select',{onchange:e=>{ state.modal.retida = e.target.value; render(); }});
    [['nao','Não'],['sim','Sim']].forEach(([v,l])=>{ const o=el('option',{value:v},[l]); if((state.modal.retida||'nao')===v) o.setAttribute('selected','selected'); retidaSel.appendChild(o); });
    m.appendChild(el('div',{class:'field'},[el('label',{},['Essa alta estava retida de dia anterior?']), retidaSel]));

    m.appendChild(actions); overlay.appendChild(m);
  }

  if(state.modal.type==='mudarUnidade'){
    const p = state.patients.find(x=>x.id===state.modal.id);
    const m = el('div',{class:'modal'});
    m.appendChild(el('h2',{},['Mudar unidade']));

    m.appendChild(actions); overlay.appendChild(m);
  }
  return overlay;

// ---- Safety Huddle: checklist diário de metas por leito ----
function getHuddleChecked(p){
  if(p.huddleDate !== todayStr()) return {};
  return p.huddleChecked || {};
}
function toggleHuddleGoal(patientId, lineKey, lineText){
  const p = state.patients.find(x=>x.id===patientId); if(!p) return;
  const checked = Object.assign({}, getHuddleChecked(p));
  const willBeChecked = !checked[lineKey];
  checked[lineKey] = willBeChecked;
  p.huddleDate = todayStr();
  p.huddleChecked = checked;
  const today = todayStr();
  if(!Array.isArray(p.metasValidadas)) p.metasValidadas = [];
  if(willBeChecked){
    const jaExiste = p.metasValidadas.some(m=>m.data===today && m.meta===lineText);
    if(!jaExiste) p.metasValidadas.push({ data: today, meta: lineText });
  } else {
    p.metasValidadas = p.metasValidadas.filter(m=>!(m.data===today && m.meta===lineText));
  }
  savePatient(p);
  render();
}

  ['Metas validadas no Safety Huddle', u=>String(u.metasHuddle)],
  ['Altas no período', u=>String(u.altas)],
  ['Média de permanência (dias)', u=>u.mediaPerm!==null?String(u.mediaPerm):'—'],
  ['Média CVC (dias)', u=>u.cvcMedia!==null?String(u.cvcMedia):'—']
];
function computeDashboardRow(label, unit, totalLeitos){
  const rows = collectReportRows(state.reportFrom, state.reportTo, unit);
  const patientFilter = unit==='ALL_UNITS' ? (()=>true) : (p=>patientUnit(p)===unit);
  const ativos = state.patients.filter(p=>p.status==='ativo' && patientFilter(p));
  const ocupados = ativos.length;
  const taxaOcup = totalLeitos>0 ? Math.round((ocupados/totalLeitos)*100) : null;
  const altasNoPeriodo = state.patients.filter(p=>p.status==='alta' && patientFilter(p) && p.dataAlta>=state.reportFrom && p.dataAlta<=state.reportTo && p.dataAdmissao);
  const permanencias = altasNoPeriodo.map(p=>diffDays(p.dataAdmissao,p.dataAlta)).filter(d=>d>=0);
  const mediaPerm = permanencias.length ? Math.round((permanencias.reduce((s,d)=>s+d,0)/permanencias.length)*10)/10 : null;
  const cvcDur = computeDeviceDurations('cvc', true, unit);
  let metasHuddle = 0;
  state.patients.filter(patientFilter).forEach(p=>{
    (p.metasValidadas||[]).forEach(m=>{ if(m.data>=state.reportFrom && m.data<=state.reportTo) metasHuddle++; });
  });
  return {
    unit: label, ativos: ocupados, totalLeitos, taxaOcup,
    camIcu: indicatorPctCAMICU(rows), tre: indicatorPctTRE(rows),
    tev: indicatorFilledPct(rows,'tevProfilaxia'), gastrica: indicatorPct(rows,'protecaoGastrica','sim'),
    metasHuddle, altas: altasNoPeriodo.length, mediaPerm, cvcMedia: cvcDur.avg
  };
}
function computeUnitDashboardData(){
  const perUnit = state.units.map(u => computeDashboardRow(u, u, state.bedCounts[u]||0));
  const totalLeitosTodas = state.units.reduce((s,u)=>s+(state.bedCounts[u]||0),0);
  const consolidado = computeDashboardRow('🏥 TODAS AS UNIDADES', 'ALL_UNITS', totalLeitosTodas);
  return [...perUnit, consolidado];
}

function buildLeitosView(){

      if(devAlertDays) badges.push(el('span',{class:'alert-tag'},['⚠️ Dispositivo ≥7d']));

      const dvaTxt = dvaString(p);
      const sedTxt = sedacaoString(p);
      const dietaTxt = optLabel(DIETA_OPTS, p.dieta) || '—';
      const atbTxt = p.atb ? (p.atb.length>50 ? p.atb.slice(0,50)+'…' : p.atb) : '—';

      if(p.shilley && p.shilley.local) dispositivos.push('Shilley'+(p.shilley.data?' ('+diffDays(p.shilley.data,todayStr())+'d)':''));

      if(p.intubacaoOrotraqueal && p.intubacaoOrotraqueal.data) dispositivos.push('TOT ('+diffDays(p.intubacaoOrotraqueal.data,todayStr())+'d)');

        el('div',{class:'bed-nome'},[p.nome||'(sem nome)']),
        el('div',{class:'bed-info', style:'margin-bottom:4px;'},[
          (p.hipotese ? (p.hipotese.length>40?p.hipotese.slice(0,40)+'…':p.hipotese) : '—') +
          (days!==null ? '  ·  '+days+(days===1?' dia':' dias') : '')
        ]),
        infoRow('DVA', dvaTxt),
        infoRow('Sedação', sedTxt),
        infoRow('Dieta', dietaTxt),
        infoRow('ATB', atbTxt),

  ]));
  return wrap;
}

  const tabs = el('div',{class:'tabs'},[
    el('button',{class:'tab'+(state.view==='ativos'?' active':''), onclick:()=>{state.view='ativos'; render();}},['Pacientes ativos']),
    el('button',{class:'tab'+(state.view==='leitos'?' active':''), onclick:()=>{state.view='leitos'; render();}},['🛏️ Mapa de Leitos']),
    el('button',{class:'tab'+(state.view==='huddle'?' active':''), onclick:()=>{state.view='huddle'; render();}},['🤝 Safety Huddle']),
    el('button',{class:'tab'+(state.view==='arquivo'?' active':''), onclick:()=>{state.view='arquivo'; render();}},['Arquivo de altas']),
    el('button',{class:'tab'+(state.view==='relatorios'?' active':''), onclick:()=>{state.view='relatorios'; render();}},['Relatórios']),
    el('button',{class:'tab'+(state.view==='dashboard'?' active':''), onclick:()=>{state.view='dashboard'; render();}},['📊 Dashboard Executivo']),
    el('button',{class:'tab'+(state.view==='diagnostico'?' active':''), onclick:()=>{state.view='diagnostico'; render();}},['🔍 Diagnóstico'])
  ]);
  app.appendChild(tabs);
  if(state.loading){ app.appendChild(el('div',{class:'empty-state'},['Carregando dados salvos...'])); }
  else if(state.view==='ativos'){ app.appendChild(buildActiveView()); }
  else if(state.view==='leitos'){ app.appendChild(buildLeitosView()); }
  else if(state.view==='huddle'){ app.appendChild(buildHuddleView()); }
  else if(state.view==='arquivo'){ app.appendChild(buildArchiveView()); }
  else if(state.view==='diagnostico'){ app.appendChild(buildDiagnosticoView()); }
  else if(state.view==='dashboard'){ app.appendChild(buildDashboardView()); }
  else { app.appendChild(buildReportsView()); }
  app.appendChild(el('footer',{class:'note'},[
    'Os dados ficam salvos automaticamente entre as sessões, e o que foi preenchido continua disponível nos dias seguintes até você atualizar. Diferente dos outros campos, a coluna "Metas do dia" é reiniciada automaticamente a cada novo dia se não for reescrita/reconfirmada — evita metas esquecidas ficando penduradas indefinidamente. Se você escrever nas Metas sobre um exame de imagem (TC, EDA, USG, ECO ou ECG), o app já dispara sozinho um alerta pro grupo do Telegram, sem precisar de botão separado. Use "Exportar Excel" para salvar uma cópia (.xlsx) na sua pasta do OneDrive, ou "Imprimir resumo" para uma folha só com nome, leito, ATB, DVA, sedação e metas. ',
    'Este app não substitui o prontuário oficial do paciente. Os dados ficam salvos no banco de dados do Firebase configurado por você — por padrão, sem login/autenticação, qualquer pessoa com o link do app e acesso ao mesmo projeto Firebase pode ler ou alterar os dados. Não possui garantias de segurança/LGPD para dados de saúde nessa configuração inicial — use como apoio de rodada, não como registro definitivo, e considere adicionar autenticação no Firebase antes de usar com dados reais de pacientes.'
  ]));
  const modal = buildModal();
  if(modal) app.appendChild(modal);
  if(state.view==='relatorios' && !state.loading){ renderReportCharts(); }
  if(state.view==='dashboard' && !state.loading){ renderDashboardCharts(); }
}

let chartInstances = [];
function destroyCharts(){
  chartInstances.forEach(c=>{ try{ c.destroy(); }catch(e){} });
  chartInstances = [];
}
function makeBarChart(canvasId, labels, values, color, horizontal){
  const el2 = document.getElementById(canvasId);
  if(!el2 || typeof Chart==='undefined') return;
  const chart = new Chart(el2.getContext('2d'), {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: color||'#0F6E6E', borderRadius:4 }] },
    options: {
      indexAxis: horizontal ? 'y' : 'x',
      responsive: true,
      plugins: { legend: { display:false } },
      scales: { x:{ beginAtZero:true }, y:{ beginAtZero:true } }
    }
  });
  chartInstances.push(chart);
}
function renderReportCharts(){
  destroyCharts();
  const data = state._chartData;
  if(!data) return;
  if(typeof Chart==='undefined'){
    document.querySelectorAll('.chart-box').forEach(box=>{
      box.innerHTML = '<div style="font-size:11.5px;color:var(--amber);">Não consegui carregar a biblioteca de gráficos agora (verifique a conexão com a internet) — os números continuam disponíveis nas tabelas acima.</div>';
    });
    return;
  }
  if(data.indicadores) makeBarChart('chart-indicadores', data.indicadores.labels, data.indicadores.values.map(v=>v===null?0:v), '#0F6E6E', false);
  if(data.diagnosticos && data.diagnosticos.labels.length) makeBarChart('chart-diagnosticos', data.diagnosticos.labels, data.diagnosticos.values, '#5B4B8A', true);
  if(data.atb && data.atb.labels.length) makeBarChart('chart-atb', data.atb.labels, data.atb.values, '#B45309', true);
  if(data.altas && data.altas.labels.length) makeBarChart('chart-altas', data.altas.labels, data.altas.values, '#2F7D5A', false);
  if(data.dispositivos) makeBarChart('chart-dispositivos', data.dispositivos.labels, data.dispositivos.values.map(v=>v===null?0:v), '#647079', false);
  if(data.dieta && data.dieta.labels.length) makeBarChart('chart-dieta', data.dieta.labels, data.dieta.values, '#0F6E6E', false);
  if(data.mobilizacao && data.mobilizacao.labels.length) makeBarChart('chart-mobilizacao', data.mobilizacao.labels, data.mobilizacao.values, '#2F7D5A', false);
  if(data.tevTipo && data.tevTipo.labels.length) makeBarChart('chart-tevTipo', data.tevTipo.labels, data.tevTipo.values, '#B45309', false);
  if(data.vmModalidade && data.vmModalidade.labels.length) makeBarChart('chart-vmModalidade', data.vmModalidade.labels, data.vmModalidade.values, '#647079', false);
  if(data.rass && data.rass.labels.length) makeBarChart('chart-rass', data.rass.labels, data.rass.values, '#5B4B8A', false);
}

// ---- Tela de senha simples (trava de tela, não é autenticação de verdade) ----
const LOCK_LS_KEY = 'uti_app_password';
const LOCK_SS_KEY = 'uti_app_unlocked';
const HUDDLE_ONLY_SS_KEY = 'uti_huddle_only';
function isHuddleOnly(){
  try{ return sessionStorage.getItem(HUDDLE_ONLY_SS_KEY)==='1' && !isUnlocked(); }catch(e){ return false; }
}
const AUTO_LOCK_MINUTES = 10;
let inactivityTimer = null;
let inactivityListenersAttached = false;

function hasPasswordSet(){
  try{ return !!localStorage.getItem(LOCK_LS_KEY); }catch(e){ return false; }
}
function isUnlocked(){
  try{ return sessionStorage.getItem(LOCK_SS_KEY)==='1'; }catch(e){ return false; }
}
function lockApp(){
  try{ sessionStorage.removeItem(LOCK_SS_KEY); sessionStorage.removeItem(HUDDLE_ONLY_SS_KEY); }catch(e){}
  showLockScreen();
}
function resetInactivityTimer(){
  clearTimeout(inactivityTimer);
  inactivityTimer = setTimeout(lockApp, AUTO_LOCK_MINUTES*60000);
}
function attachInactivityListeners(){
  if(inactivityListenersAttached) return;
  inactivityListenersAttached = true;
  ['mousemove','keydown','click','touchstart','scroll'].forEach(evt=>{
    window.addEventListener(evt, resetInactivityTimer, {passive:true});
  });
}
function changeAppPassword(){
  const atual = hasPasswordSet() ? prompt('Digite a senha atual:') : null;
  if(hasPasswordSet()){
    try{ if(atual !== localStorage.getItem(LOCK_LS_KEY)){ showToast('Senha atual incorreta.'); return; } }catch(e){}
  }
  const nova = prompt('Digite a nova senha:');
  if(!nova){ return; }
  try{ localStorage.setItem(LOCK_LS_KEY, nova); }catch(e){}
  showToast('Senha alterada com sucesso.');
}
function showLockScreen(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  const isSetup = !hasPasswordSet();
  const box = document.createElement('div');
  box.style.cssText = 'max-width:400px;margin:80px auto;background:#fff;border:1px solid #E2E7EA;border-radius:14px;padding:28px;font-family:Arial,sans-serif;text-align:center;';
  box.innerHTML = `
    <div style="font-size:32px;margin-bottom:6px;">🔒</div>
    <h1 style="font-size:17px;margin:0 0 6px;color:#1F2937;">${isSetup ? 'Criar senha de acesso' : 'App bloqueado'}</h1>
    <p style="color:#647079;font-size:12.5px;line-height:1.5;margin:0 0 16px;">
      ${isSetup ? 'Defina uma senha para proteger a tela neste computador. Isso trava a visualização quando o app fica aberto sem uso, mas não substitui um login de verdade.' : 'Digite a senha para continuar.'}
    </p>
    <div id="lock-error" style="display:none;background:#FBEAE9;color:#B3261E;padding:8px;border-radius:8px;font-size:12px;margin-bottom:10px;"></div>
    <input id="lock-input" type="password" placeholder="${isSetup?'Nova senha':'Senha'}" style="width:100%;padding:10px;border-radius:8px;border:1px solid #E2E7EA;font-size:14px;box-sizing:border-box;margin-bottom:10px;" />
    ${isSetup ? '<input id="lock-input2" type="password" placeholder="Confirme a senha" style="width:100%;padding:10px;border-radius:8px;border:1px solid #E2E7EA;font-size:14px;box-sizing:border-box;margin-bottom:10px;" />' : ''}
    <button id="lock-btn" style="width:100%;padding:10px;font-size:14px;font-weight:600;border-radius:8px;border:1px solid #0F6E6E;background:#0F6E6E;color:#fff;cursor:pointer;">${isSetup?'Criar senha e entrar':'Entrar'}</button>
    ${!isSetup ? '<button id="huddle-only-btn" style="width:100%;padding:10px;font-size:13px;font-weight:600;border-radius:8px;border:1px solid #E2E7EA;background:transparent;color:#647079;cursor:pointer;margin-top:10px;">🤝 Acessar somente o Safety Huddle (sem senha)</button>' : ''}
  `;
  app.appendChild(box);
  const input1 = document.getElementById('lock-input');
  const errBox = document.getElementById('lock-error');
  const doUnlock = ()=>{
    if(isSetup){
      const input2 = document.getElementById('lock-input2');
      if(!input1.value || input1.value.length<3){ errBox.textContent='A senha deve ter pelo menos 3 caracteres.'; errBox.style.display='block'; return; }
      if(input1.value !== input2.value){ errBox.textContent='As senhas não coincidem.'; errBox.style.display='block'; return; }
      try{ localStorage.setItem(LOCK_LS_KEY, input1.value); }catch(e){}
    } else {
      let saved = null;
      try{ saved = localStorage.getItem(LOCK_LS_KEY); }catch(e){}
      if(input1.value !== saved){ errBox.textContent='Senha incorreta.'; errBox.style.display='block'; input1.value=''; input1.focus(); return; }
    }
    try{ sessionStorage.setItem(LOCK_SS_KEY, '1'); sessionStorage.removeItem(HUDDLE_ONLY_SS_KEY); }catch(e){}
    attachInactivityListeners();
    resetInactivityTimer();
    boot();
  };
  document.getElementById('lock-btn').addEventListener('click', doUnlock);
  input1.addEventListener('keydown', e=>{ if(e.key==='Enter') doUnlock(); });
  const huddleBtn = document.getElementById('huddle-only-btn');
  if(huddleBtn){
    huddleBtn.addEventListener('click', ()=>{
      try{ sessionStorage.setItem(HUDDLE_ONLY_SS_KEY, '1'); }catch(e){}
      attachInactivityListeners();
      resetInactivityTimer();
      boot();
    });
  }
  input1.focus();
}

async function boot(){
  if(!firebaseReady){
    let saved = null;
    try{ saved = localStorage.getItem(LS_KEY); }catch(e){}
    if(saved){
      try{ initFirebase(JSON.parse(saved)); }
      catch(e){ showConfigScreen('A configuração salva neste navegador parece inválida. Cole novamente abaixo.'); return; }
    } else {
      showConfigScreen();
      return;
    }
  }
  if(!isUnlocked() && !isHuddleOnly()){
    showLockScreen();
    return;
  }
  attachInactivityListeners();
  resetInactivityTimer();
  try{
    // Se o Firebase não responder em 8s (config errada, projeto bloqueado, sem internet), mostra aviso.
    const timeout = new Promise((_, reject)=>setTimeout(()=>reject(new Error('timeout')), 8000));
    await Promise.race([loadUnits(), timeout]);
    loadIntegrationConfig(); // não bloqueia a tela — carrega em segundo plano
    render();
    await Promise.race([loadAllPatients(), timeout]);
  }catch(e){
    const app = document.getElementById('app');
    app.innerHTML = '';
    const box = el('div',{style:'max-width:640px;margin:60px auto;background:#fff;border:2px solid var(--amber);border-radius:14px;padding:24px;'});
    box.appendChild(el('h1',{style:'font-size:17px;margin:0 0 10px;'},['⚠️ Não consegui conectar ao Firebase']));
    box.appendChild(el('p',{style:'color:var(--muted);line-height:1.6;'},[
      'O app carregou, mas não recebeu resposta do banco de dados a tempo. Causas mais comuns: (1) o Firestore Database ainda não foi criado no console do Firebase; (2) as regras de segurança do Firestore estão bloqueando o acesso; (3) sem conexão com a internet no momento.'
    ]));
    box.appendChild(el('button',{class:'primary', onclick:()=>location.reload()},['Tentar novamente']));
    box.appendChild(el('button',{onclick:()=>{ try{localStorage.removeItem(LS_KEY);}catch(err){} location.reload(); }, style:'margin-left:8px;'},['Trocar configuração do Firebase']));
    app.appendChild(box);
  }
}
window.addEventListener('online', ()=>{ if(!state.loading && (isUnlocked()||isHuddleOnly())) render(); });
window.addEventListener('offline', ()=>{ if(!state.loading && (isUnlocked()||isHuddleOnly())) render(); });
boot();
</script>
